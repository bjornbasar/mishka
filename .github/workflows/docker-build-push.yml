name: Build and Push Docker Image

# Prod ghcr publish (GitHub-hosted). On a v* tag: build the self-contained runtime
# image on ubuntu-latest and push to ghcr.io/bjornbasar/mishka-php (movable :latest +
# fixed split-semver). The LAN dev deploy to Bosco is the local loop's job
# (ci/deploy.sh); this only produces the cloud copy. Package is PRIVATE (Bosco pulls
# the local registry — ghcr is a cold copy).
on:
  push:
    tags: ['v*']

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # push to ghcr.io/bjornbasar/*
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/bjornbasar/mishka-php
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push (target=runtime — mishka has no `prod` stage)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
