name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore: ['**.md']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Tests (PHP 8.4, SQLite)

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, pdo_pgsql
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: vendor/bin/phpunit

      - name: Static analysis
        run: vendor/bin/phpstan analyse

  pg-smoke:
    runs-on: ubuntu-latest
    name: PG smoke (PostgreSQL 16)
    needs: test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mishka_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Apply schema
        env:
          DB_DSN: 'pgsql:host=localhost;port=5432;dbname=mishka_test'
          DB_USER: postgres
          DB_PASS: postgres
        run: php vendor/bjornbasar/karhu/bin/karhu migrate

      - name: Run PG smoke tests
        env:
          DB_DSN: 'pgsql:host=localhost;port=5432;dbname=mishka_test'
          DB_USER: postgres
          DB_PASS: postgres
        run: vendor/bin/phpunit --filter 'PgSmoke'

  # v0.7.2 — build self-contained image on Ruxa, push to local registry.
  # Runs on main pushes AND tag pushes. Deploy job depends on it.
  build:
    runs-on: [self-hosted, homelab]
    needs: [test, pg-smoke]
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    # Round-2 C2 (CRITICAL): without this, two rapid main pushes race on the
    # final `docker push :latest` and the LATER-finishing build wins,
    # potentially writing the OLDER code's image to `:latest`. Serialize.
    concurrency:
      group: build-mishka
      cancel-in-progress: false

    env:
      RUXA: ubuntu@192.168.4.9
      RUXA_DIR: /data/personal/mishka
      REGISTRY: 192.168.4.9:5000
      IMAGE: mishka-php

    steps:
      - name: Pull source on Ruxa
        run: |
          ssh $RUXA "cd $RUXA_DIR && git pull --ff-only"

      - name: Compute image tags
        id: tags
        run: |
          SHA="${GITHUB_SHA:0:7}"
          TAGS="${REGISTRY}/${IMAGE}:sha-${SHA}"
          if [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            TAGS="$TAGS ${REGISTRY}/${IMAGE}:latest"
          fi
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAGS="$TAGS ${REGISTRY}/${IMAGE}:${GITHUB_REF#refs/tags/}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "primary=${REGISTRY}/${IMAGE}:sha-${SHA}" >> "$GITHUB_OUTPUT"
          # Cloud-copy (ghcr) tags: movable :latest on main + fixed split-semver
          # on release (prerelease/non-semver → full tag only, never move latest).
          # No per-commit sha- on ghcr — keeps the cold cloud copy tidy.
          GHCR="ghcr.io/bjornbasar/${IMAGE}"
          GHCR_TAGS=""
          if [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            GHCR_TAGS="${GHCR}:latest"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            V="${GITHUB_REF#refs/tags/v}"
            if [[ "$V" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              GHCR_TAGS="${GHCR}:${V} ${GHCR}:${V%.*} ${GHCR}:${V%%.*} ${GHCR}:latest"
            else
              GHCR_TAGS="${GHCR}:${V}"
            fi
          fi
          echo "ghcr_tags=$GHCR_TAGS" >> "$GITHUB_OUTPUT"

      - name: Build image on Ruxa
        run: |
          ssh $RUXA "cd $RUXA_DIR && docker build -t ${{ steps.tags.outputs.primary }} ."

      - name: Smoke-test the built image (round-2 C9 + round-3 C5 + round-4 S3)
        # Cheap sanity: autoloader resolves + Composer\InstalledVersions has
        # the runtime package metadata. Round-3 C5: catches regressions in
        # the two-step composer ceremony (--no-autoloader → dump-autoload
        # --classmap-authoritative MUST regenerate installed.php). Round-4
        # S3: fail loudly if InstalledVersions returns empty/null (silent
        # empty would otherwise echo a blank line + exit 0).
        run: |
          ssh $RUXA "docker run --rm ${{ steps.tags.outputs.primary }} \
            php -r '\
              require \"/app/vendor/autoload.php\"; \
              \$v = \Composer\InstalledVersions::getVersion(\"twig/twig\"); \
              if (!\$v) { fwrite(STDERR, \"installed.php broken: twig version empty\n\"); exit(1); } \
              echo \"autoload-ok twig=\$v\n\"; \
            '"

      - name: Tag + push all
        run: |
          for tag in ${{ steps.tags.outputs.tags }}; do
            ssh $RUXA "docker tag ${{ steps.tags.outputs.primary }} $tag && docker push $tag"
          done

      # Best-effort PRIVATE cloud copy to ghcr (Bosco pulls the LOCAL registry,
      # so this is copy-only — no pull creds anywhere). Separate + non-fatal:
      # a ghcr blip (e.g. a stale token after gh auth activity on Ruxa — re-run
      # `gh auth token | docker login ghcr.io -u bjornbasar --password-stdin`)
      # must never fail the deploy. ::warning:: keeps a failed copy visible.
      - name: Copy image to ghcr (best-effort, private)
        if: steps.tags.outputs.ghcr_tags != ''
        run: |
          for tag in ${{ steps.tags.outputs.ghcr_tags }}; do
            ssh $RUXA "docker tag ${{ steps.tags.outputs.primary }} $tag && docker push $tag" \
              || echo "::warning title=ghcr copy failed::$tag not copied (Bosco deploy unaffected). Check 'docker login ghcr.io' on Ruxa."
          done

  deploy:
    runs-on: [self-hosted, homelab]
    needs: [test, pg-smoke, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      RUXA: ubuntu@192.168.4.9
      BOSCO: ubuntu@192.168.4.34
      RUXA_DIR: /data/personal/mishka
      BOSCO_DIR: /data/mishka

    # v0.7.1 round-3 C5: don't cancel in-flight deploys — let each complete
    # so its audit row lands in schema_versions. Sequential queue on the
    # hurska-mishka runner.
    concurrency:
      group: deploy-mishka
      cancel-in-progress: false

    steps:
      - name: Decrypt .env on Ruxa
        # v0.7.2: no more composer install or vendor rsync — the image carries
        # everything. Only .env (decrypted from .env.enc) + docker-compose.yml
        # need to land on Bosco.
        run: |
          ssh $RUXA "cd $RUXA_DIR && \
            sops decrypt --input-type dotenv --output-type dotenv --output .env.new .env.enc && \
            mv .env.new .env"

      - name: Sync .env + compose to Bosco (compose + env only, NO source)
        run: |
          ssh $RUXA "rsync -a $RUXA_DIR/.env $RUXA_DIR/docker-compose.yml $BOSCO:$BOSCO_DIR/"

      - name: Pull new image + chown mishka-sessions + recreate containers on Bosco
        # docker compose pull resolves :latest to the digest the build job
        # just pushed. up -d --remove-orphans recreates app + worker with
        # the new image (compose detects image digest change). Brief
        # downtime during the swap — single php -S process, no graceful
        # handoff. Acceptable for family-scale.
        #
        # v0.8.5+ non-root migration (DOCS #75): sequence is
        #   pull → stop app + worker → alpine chown+chmod the named
        #   volume → up -d.
        # The OLD (root) container is STOPPED before the alpine chown
        # fires, so no PHP process can write a mid-migration session
        # file that would land root-owned + mode 600 inside the newly
        # www-data-owned mode 700 sessions dir (race window eliminated).
        #
        # The chown is IDEMPOTENT: on already-correct perms (post-v0.8.5)
        # it's a no-op, so this step stays in every future deploy as a
        # belt-and-braces guard against manual volume tweaks or
        # restore-from-backup.
        #
        # Alpine pinned to sha256 digest (Q3 user-locked, plan file
        # round-2 SHOULD-FIX S2): reproducible + first pull hits Docker
        # Hub, subsequent deploys resolve from local Docker layer cache.
        # Digest captured 2026-07-19 from `alpine:3`; refresh only if we
        # deliberately want a newer base image.
        #
        # `set -e` inside the alpine sh -c so a chmod failure aborts the
        # whole chain — otherwise the compound `&&` chain in ssh's outer
        # shell would accept the docker-run exit=0 even if the internal
        # chmod failed silently (plan file round-2 SHOULD-FIX S3).
        run: |
          ssh $BOSCO "cd $BOSCO_DIR && \
            docker compose pull && \
            docker compose stop app worker && \
            docker run --rm -v mishka_mishka-sessions:/target \
              alpine@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b \
              sh -c 'set -e; chown -R 33:33 /target && chmod 700 /target' && \
            docker compose up -d --remove-orphans"

      - name: Assert containers running as www-data (v0.8.5 post-flight)
        # Belt-and-braces (plan-agent round-1 NICE-TO-HAVE 7) against a
        # future php:8.4-cli base migrating off Debian's uid-33 www-data
        # mapping. Unlikely (Debian policy locks it) but fail-loud if it
        # happens instead of silently letting the deploy report green with
        # a wrong-uid runtime.
        run: |
          ssh $BOSCO "docker exec mishka-app id www-data | grep -q 'uid=33' && \
                      docker exec mishka-app whoami | grep -qx 'www-data'"

      - name: Run schema migration (idempotent + tracked)
        # Container has been recreated with new image; vendor + schema.sql
        # are baked in. Migrate reads the new schema.sql, hash-check skips
        # if unchanged, INSERTs audit row otherwise.
        run: |
          ssh $BOSCO "docker exec mishka-app php vendor/bjornbasar/karhu/bin/karhu migrate --applied-by=ci-deploy"

      - name: Seed tracker foods (idempotent, v0.8.0+)
        # Loads db/seed/tracker_foods.json into the global (household_id
        # IS NULL) foods table. Partial UNIQUE idx_foods_seed_unique
        # dedups reruns. First-deploy inserts ~41 dishes; every deploy
        # after that reports "skipped 41 existing". Non-zero exit fails
        # CI + fires the failure Slack — half-applied deploy = incident,
        # rollback via compose SHA-pin per DOCS #68. See DOCS #70.
        run: |
          ssh $BOSCO "docker exec mishka-app php vendor/bjornbasar/karhu/bin/karhu tracker:seed-foods"

      - name: Seed tracker exercises (idempotent, v0.8.1+)
        # Loads db/seed/tracker_exercises.json into the global exercises
        # catalog. Partial UNIQUE idx_exercises_seed_unique dedups reruns.
        # First-deploy inserts ~35 exercises; subsequent deploys skip all.
        # Same failure-mode posture as tracker:seed-foods (DOCS #63).
        # See DOCS #71.
        run: |
          ssh $BOSCO "docker exec mishka-app php vendor/bjornbasar/karhu/bin/karhu tracker:seed-exercises"

      - name: Tracker badges backfill (idempotent, v0.8.3+)
        # Iterates household × user, calls TrackerBadgeAwarder::evaluateAndGrant
        # per pair. Idempotent — BadgeAwardRepository UNIQUE dedup makes re-runs
        # silent no-ops. First-deploy grants any earned badges from pre-v0.8.3
        # exercise_log rows; subsequent deploys report zero new awards for
        # users whose state hasn't crossed a new threshold. Same failure-mode
        # posture as tracker:seed-foods (DOCS #63). See DOCS #73.
        run: |
          ssh $BOSCO "docker exec mishka-app php vendor/bjornbasar/karhu/bin/karhu tracker:badges-backfill"

      - name: Notify Slack
        if: always()
        run: |
          STATUS=${{ job.status }}
          ICON=$([ "$STATUS" = "success" ] && echo ":white_check_mark:" || echo ":x:")
          # Round-2 S1: $RUNNER_TEMP (per-runner) not /tmp/ (shared across
          # Hurska's 5 runners).
          MSG_FILE="$RUNNER_TEMP/slack-msg.json"
          echo "{\"text\":\"${ICON} *mishka* deploy ${STATUS} (Bosco → mishka.minified.work)\"}" > "$MSG_FILE"
          curl -s -X POST -H 'Content-type: application/json' -d @"$MSG_FILE" "$(cat ~/.slack-webhook)"
          rm -f "$MSG_FILE"
